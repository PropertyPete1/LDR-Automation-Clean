# Purchase intent keywords to trigger pond lead auto-reassignment to Peter
# pond_intent_keywords: REMOVED — intent detection is now fully AI-powered.
# The AI classifier (classify_lead_intent) reads all inbound communications and
# classifies intent into: buying_intent | future_timeline | opt_out | none
# with a confidence gate (>=75%) before taking any action. No keyword lists needed.

# Phase 3 — Closed/Past Client/Sphere quarterly check-in drip
# Approved by Peter on 2026-06-12. Email-only. Signed 'Truly, Peter'.
# Includes hyper-local neighborhood spots (restaurants, bars, cafes, parks) near the closed property address.
phase3_closed_drip_enabled: true
phase3_cadence_days: 90
phase3_max_emails_per_run: 20
phase3_eligible_stages:
  - "Closed"
  - "Past Client"
  - "Sphere"
phase3_daily_summary_enabled: true

# Long-Term Nurture Reply Handler
# Detects future-timeline replies ("not ready yet", "next year", etc.) from pond leads,
# moves them to the Nurture stage, tags them, and enrolls them in a 60-day AI email drip.
# Each email is freshly AI-written (no templates). Rotates: market update → referral ask → lifestyle.
# Disabled by default — enable after Peter reviews and approves.
long_term_nurture_enabled: false
long_term_nurture_cadence_days: 60
long_term_nurture_max_emails_per_run: 20
long_term_nurture_stage: "Nurture"
long_term_nurture_suppression_tag: "long-term-nurture"
# long_term_nurture_future_keywords: REMOVED — future-timeline detection is now AI-powered.
# The same classify_lead_intent call handles this classification automatically.

# Email address update scanner
# Scans the 200 most recently updated leads daily for inbound emails where the lead
# says "I no longer use this email, please contact me at [new address]".
# When detected (AI confidence >= 85%), the new email is added to the lead's FUB
# profile as the primary address, a note is logged, and the lead is tagged
# 'email-updated-auto' for agent review.
# Default: true (safe to leave on — only acts on very clear, explicit messages)
email_address_update_scan_enabled: true

# Pond nurture SMS — FUB native SMS sent alongside the daily pond nurture emails
# Uses the same FUB /textMessages API as the Lifestyle Bot (NOT Twilio)
# Deduplication: leads already texted by Lifestyle Bot today are skipped
pond_nurture_sms_enabled: true
pond_nurture_sms_daily_cap: 300
pond_nurture_sms_from_number: "5203737839"

# Cities/markets to use in AI market updates. Replace with your active service markets.
target_cities:
  - "San Antonio"
  - "New Braunfels"
  - "Austin"
  - "Dallas"
  - "Fort Worth"
  - "Houston"

# Timing rules.
agent_followup_days: 14
stale_no_contact_days: 30
# Customer pond nurture cadence: every 14 days indefinitely while the lead remains in a configured pond and has not opted out.
reengagement_cadence_days: 14
new_lead_warning_enabled: true
new_lead_reassignment_enabled: true
new_lead_warning_minutes: 30
new_lead_reassign_minutes: 60
new_lead_reassign_to_user_id: 2
new_lead_reassign_to_name: "Peter Allen"
new_lead_timer_mode: "business_hours"
business_hours_start: "10:00"
business_hours_end: "18:00"
# Monday=0 through Sunday=6. Current setting counts all days from 10 AM to 6 PM Central.
business_hours_days: [0, 1, 2, 3, 4, 5, 6]
local_timezone: "America/Chicago"
