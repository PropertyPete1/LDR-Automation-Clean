# Daily Automation — runs at 7:00 AM CT daily
# CT = UTC-6 (CST) or UTC-5 (CDT). Using UTC 12:00 for CDT (summer).
# DST note: GitHub cron uses UTC only. Adjust to 13:00 UTC when CDT ends (~Nov).
name: Daily Automation

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

concurrency:
  group: ldr-state
  cancel-in-progress: false

env:
  DRY_RUN: "false"
  FUB_API_KEY: ${{ secrets.FUB_API_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  LLM_MODEL: ${{ secrets.LLM_MODEL }}
  SMTP_HOST: ${{ secrets.SMTP_HOST }}
  SMTP_PORT: ${{ secrets.SMTP_PORT }}
  SMTP_USER: ${{ secrets.SMTP_USER }}
  SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
  EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
  DATABASE_PATH: "data/fub_automation.sqlite3"
  RULES_PATH: "config/rules.yaml"

jobs:
  daily-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pond-nurture-bot/requirements.txt

      - name: Install dependencies
        run: pip install -r pond-nurture-bot/requirements.txt

      - name: Pull state DB
        uses: ./.github/actions/state-sync
        with:
          mode: pull
          github_token: ${{ secrets.GITHUB_TOKEN }}
          encryption_key: ${{ secrets.STATE_ENCRYPTION_KEY }}

      - name: Run daily automation
        working-directory: pond-nurture-bot
        run: |
          echo "=== Daily Automation — DRY_RUN=$DRY_RUN ==="
          python3 run_approved_daily_automation.py

      - name: Push state DB
        if: always()
        uses: ./.github/actions/state-sync
        with:
          mode: push
          github_token: ${{ secrets.GITHUB_TOKEN }}
          encryption_key: ${{ secrets.STATE_ENCRYPTION_KEY }}
