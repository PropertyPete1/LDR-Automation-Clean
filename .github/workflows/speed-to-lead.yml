# Speed-to-Lead — runs every 5 minutes (polls new leads + processes timers)
# Business hours check is built into the script (10am-6pm CT).
# DST note: The script handles CT timezone internally; cron fires every 5 min UTC.
name: Speed-to-Lead

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: ldr-state
  cancel-in-progress: false

env:
  DRY_RUN: "false"
  FUB_API_KEY: ${{ secrets.FUB_API_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  LLM_MODEL: ${{ secrets.LLM_MODEL }}
  SMTP_HOST: ${{ secrets.SMTP_HOST }}
  SMTP_PORT: ${{ secrets.SMTP_PORT }}
  SMTP_USER: ${{ secrets.SMTP_USER }}
  SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
  EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
  DATABASE_PATH: "data/fub_automation.sqlite3"
  RULES_PATH: "config/rules.yaml"

jobs:
  speed-to-lead:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pond-nurture-bot/requirements.txt

      - name: Install dependencies
        run: pip install -r pond-nurture-bot/requirements.txt

      - name: Pull state DB
        uses: ./.github/actions/state-sync
        with:
          mode: pull
          github_token: ${{ secrets.GITHUB_TOKEN }}
          encryption_key: ${{ secrets.STATE_ENCRYPTION_KEY }}

      - name: Run speed-to-lead check
        working-directory: pond-nurture-bot
        run: |
          echo "=== Speed-to-Lead — DRY_RUN=$DRY_RUN ==="
          python3 run_speed_to_lead_check.py

      - name: Push state DB
        if: always()
        uses: ./.github/actions/state-sync
        with:
          mode: push
          github_token: ${{ secrets.GITHUB_TOKEN }}
          encryption_key: ${{ secrets.STATE_ENCRYPTION_KEY }}
